version: '3.8'

services:
  plankton-app:
    build:
      context: .
      # Use DOCKERFILE env var to choose variant (default: minimal)
      # Set in .env file or override: DOCKERFILE=Dockerfile docker-compose up
      dockerfile: ${DOCKERFILE:-Dockerfile.minimal}
    container_name: plankton-detection
    restart: unless-stopped
    
    ports:
      # Map container port 8501 to host port 8501
      - "8501:8501"
    
    volumes:
      # Persist database across container restarts
      - ./database:/app/database
      # Persist uploaded files
      - ./uploads:/app/uploads
      # Optional: Mount model checkpoints (if you update them frequently)
      - ./checkpoints:/app/checkpoints
    
    environment:
      # Streamlit configuration
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_BROWSER_GATHER_USAGE_STATS=false
      
      # Python configuration
      - PYTHONUNBUFFERED=1
      
      # Optional: Set data directory path
      - DATA_DIR=/app/data
    
    # Resource limits (adjust based on your Raspberry Pi model)
    deploy:
      resources:
        limits:
          # Limit to 3GB RAM (adjust for your Pi)
          memory: 3G
        reservations:
          # Reserve at least 1GB
          memory: 1G
    
    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    # Network configuration
    networks:
      - plankton-network

networks:
  plankton-network:
    driver: bridge
