version: '3.8'

services:
  # ==========================================
  # Main Plankton App (Streamlit + ML)
  # ==========================================
  plankton-app:
    build:
      context: .
      dockerfile: ${DOCKERFILE:-Dockerfile.minimal}
    container_name: plankton-detection
    restart: unless-stopped
    
    ports:
      - "8501:8501"
    
    volumes:
      # Persist database across container restarts
      - ./database:/app/database
      # Persist uploaded files
      - ./uploads:/app/uploads
      # Mount model checkpoints
      - ./checkpoints:/app/checkpoints
    
    environment:
      # Streamlit configuration
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_BROWSER_GATHER_USAGE_STATS=false
      
      # Python configuration
      - PYTHONUNBUFFERED=1
      
      # SQL Agent service URL (optional - if not set, Tab 4 will show as unavailable)
      - SQL_AGENT_URL=http://sql-agent:8002
    
    # Resource limits (adjust based on your Raspberry Pi model)
    deploy:
      resources:
        limits:
          memory: 2500M  # Reduced from 3G since SQL Agent is separate
        reservations:
          memory: 1G
    
    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    networks:
      - plankton-network
    
    # Optional: depends on SQL Agent (comment out if you want to run without it)
    # depends_on:
    #   - sql-agent

  # ==========================================
  # SQL Agent Service (Optional)
  # ==========================================
  sql-agent:
    build:
      context: ./services/sql-agent
      dockerfile: Dockerfile
    container_name: plankton-sql-agent
    restart: unless-stopped
    
    ports:
      - "8002:8002"
    
    volumes:
      # Share database with main app (read-only for safety)
      - ./database:/app/database:ro
    
    environment:
      # Groq API key (REQUIRED - set in .env file)
      - GROQ_API_KEY=${GROQ_API_KEY}
    
    # Resource limits
    deploy:
      resources:
        limits:
          memory: 512M  # SQL Agent is lightweight
        reservations:
          memory: 256M
    
    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    networks:
      - plankton-network

networks:
  plankton-network:
    driver: bridge

# ==========================================
# Usage Instructions
# ==========================================
# 
# Run both services:
#   docker-compose up -d
#
# Run only main app (without SQL Agent):
#   docker-compose up -d plankton-app
#
# Run only SQL Agent:
#   docker-compose up -d sql-agent
#
# View logs:
#   docker-compose logs -f
#
# Stop all services:
#   docker-compose down
#
# Rebuild after changes:
#   docker-compose up -d --build
